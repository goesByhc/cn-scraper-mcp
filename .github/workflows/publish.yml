name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (curl_cffi needs libcurl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcurl4-openssl-dev build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run release checks
        run: |
          python -m ruff check src tests scripts
          python -W error::RuntimeWarning -m pytest tests/ -q
          python scripts/mcp_smoke_test.py
          python scripts/platform_health.py --mock --json

      - name: Build distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Verify release tag and wheel
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -m venv /tmp/cn-scraper-release
          /tmp/cn-scraper-release/bin/pip install --no-deps dist/*.whl
          /tmp/cn-scraper-release/bin/python -c "import os, cn_scraper_mcp; expected = os.environ['RELEASE_TAG'].removeprefix('v'); actual = cn_scraper_mcp.__version__; assert actual == expected, f'release tag {expected!r} does not match package version {actual!r}'"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cn-scraper-mcp/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
