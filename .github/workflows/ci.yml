name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check (lint + format)
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

      - name: Build wheel
        run: pip wheel . -w dist/

      - name: Verify wheel contents
        shell: bash
        run: |
          wheel_file=$(ls dist/*.whl | head -1)
          echo "=== Wheel: $wheel_file ==="
          unzip -l "$wheel_file" | grep -E 'cn_scraper_mcp/'

          # Verify expected modules are present
          echo "=== Checking required modules ==="
          for mod in \
            "__init__.py" \
            "server.py" \
            "auth.py" \
            "http.py" \
            "errors.py" \
            "logging.py" \
            "engines/__init__.py" \
            "engines/taobao.py" \
            "engines/jd.py" \
            "engines/pdd.py" \
            "engines/cdp.py" \
            "engines/xiaohongshu.py" \
            "engines/zhihu.py" \
            "engines/zsxq.py"; do
            if unzip -l "$wheel_file" | grep -q "cn_scraper_mcp/$mod"; then
              echo "  ✓ $mod"
            else
              echo "  ✗ MISSING: $mod"
              exit 1
            fi
          done
          echo "=== All modules present ==="
