name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (curl_cffi needs libcurl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcurl4-openssl-dev build-essential

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: python -W error::RuntimeWarning -m pytest tests/ -v

      - name: Run Ruff
        run: python -m ruff check src tests scripts

      - name: MCP protocol smoke test
        if: matrix.python-version == '3.11'
        run: python scripts/mcp_smoke_test.py

      - name: Build distribution
        if: matrix.python-version == '3.11'
        run: |
          python -m build
          python -m twine check dist/*

      - name: Verify wheel installation
        if: matrix.python-version == '3.11'
        run: |
          python -m venv /tmp/cn-scraper-wheel
          /tmp/cn-scraper-wheel/bin/pip install --no-deps dist/*.whl
          /tmp/cn-scraper-wheel/bin/python -c "import cn_scraper_mcp; assert cn_scraper_mcp.__version__ == '0.1.0'"

      - name: Platform health check (mock)
        run: python scripts/platform_health.py --mock --json
